<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Daily Agenda</title>

<style>
body {
  margin:0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background:#f4f2ed;
  color:#2e2e2e;
  overflow:hidden;
}

.container {
  padding:80px 120px;
  height:100vh;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
}

.header {
  text-align:center;
  margin-bottom:60px;
}

.greeting {
  font-size:52px;
  font-weight:600;
  margin-bottom:10px;
}

.date {
  font-size:30px;
  color:#6a6a6a;
}

.section-title {
  font-size:18px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#7a7a7a;
  margin-bottom:15px;
}

.value {
  font-size:44px;
  font-weight:600;
  margin-bottom:50px;
}

.two-column {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:120px;
}

.movie {
  margin-top:20px;
}

.movie .value {
  font-size:56px;
}

.reminders {
  margin-top:20px;
}

.reminders .value {
  font-size:32px;
  margin-bottom:20px;
}

.weekly {
  display:none;
}

.week-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:20px;
  margin-top:40px;
}

.week-day {
  background:#ffffff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.week-day h3 {
  font-size:16px;
  margin-bottom:15px;
  color:#6a6a6a;
}

.week-day p {
  font-size:18px;
  font-weight:600;
  margin:5px 0;
}

.banner {
  position:absolute;
  bottom:0;
  width:100%;
  background:#8b1e1e;
  color:#fff;
  font-size:26px;
  padding:15px 0;
  overflow:hidden;
}

.banner span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 22s linear infinite;
  white-space:nowrap;
  font-weight:500;
}

.page {
  display:none;
}

.page.active {
  display:block;
}

@keyframes scroll {
  0% { transform:translateX(0); }
  100% { transform:translateX(-100%); }
}
</style>
</head>

<body>

<div class="container">

  <div class="page active" id="dailyPage">

    <div class="header">
      <div class="greeting" id="greeting"></div>
      <div class="date" id="date"></div>
    </div>

    <div class="two-column">

      <div>
        <div class="section-title">Morning Activity</div>
        <div class="value" id="morning"></div>

        <div class="section-title">Afternoon Activity</div>
        <div class="value" id="afternoon"></div>
      </div>

      <div>
        <div class="section-title">Tonight's Movie</div>
        <div class="value" id="movie"></div>

        <div class="section-title">Reminders</div>
        <div class="reminders">
          <div class="value" id="reminder1"></div>
          <div class="value" id="reminder2"></div>
        </div>
      </div>

    </div>

  </div>

  <div class="page weekly" id="weeklyPage">

    <div class="header">
      <div class="greeting">A Look at the Week</div>
      <div class="date"></div>
    </div>

    <div class="week-grid" id="weekGrid">
    </div>

  </div>

</div>

<div class="banner">
  <span id="urgent"></span>
</div>

<script>

// Greeting logic
const hour = new Date().getHours();
let greetingText = "Good Morning";
if (hour >= 12 && hour < 17) greetingText = "Good Afternoon";
if (hour >= 17) greetingText = "Good Evening";
document.getElementById("greeting").innerText = greetingText;

// Fetch Sheet Data
fetch("https://opensheet.elk.sh/19qGfblEVLezYvpctCS90aoj_5DOy9rrAbgcPBwVpHr0/Sheet1")
.then(res => res.json())
.then(data => {

  if (!data.length) return;

  const row = data[0];

  function clean(v) {
    return (v || "").replace(/"/g,"");
  }

  document.getElementById("date").innerText = clean(row.Date);
  document.getElementById("morning").innerText = clean(row["Morning Activity"]);
  document.getElementById("afternoon").innerText = clean(row["Afternoon Activity"]);
  document.getElementById("movie").innerText = clean(row.Movie);
  document.getElementById("reminder1").innerText = clean(row["Reminder 1"]);
  document.getElementById("reminder2").innerText = clean(row["Reminder 2"]);
  document.getElementById("urgent").innerText = clean(row["Urgent Banner"]);

});

// Page rotation
let showWeekly = false;
setInterval(() => {
  showWeekly = !showWeekly;
  document.getElementById("dailyPage").classList.toggle("active");
  document.getElementById("weeklyPage").classList.toggle("active");
}, 20000);

</script>

</body>
</html>
